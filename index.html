<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0908" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Moviebase" />
    <meta name="description" content="Личный трекер фильмов и сериалов" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://image.tmdb.org" />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <title>Moviebase Personal</title>
    <script>
      // No-flash инициализация темы. Запускается до загрузки React-бандла,
      // ставит data-theme и meta[name="theme-color"] на основе localStorage/системы.
      (function () {
        try {
          var saved = localStorage.getItem('mb-theme');
          var choice = (saved === 'dark' || saved === 'light' || saved === 'auto') ? saved : 'auto';
          var resolved = (choice === 'auto')
            ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : choice;
          document.documentElement.setAttribute('data-theme', resolved);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'light' ? '#fbf8f3' : '#0a0908');
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body class="bg-bg text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
